<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FormBot | Minimalist Orchestrator</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="astral-container">
        <header class="minimal-header">
            <div class="brand">
                <i data-lucide="zap" class="accent-icon"></i>
                <h1>FormBot</h1>
            </div>
            <div class="system-badge">
                <span class="dot"></span>
                v2.8 STABLE
            </div>
        </header>

        <main class="minimal-main">
            <!-- Central Orchestration Card -->
            <section class="orchestrator-card">
                <div class="card-intro">
                    <h2>Deploy Protocol</h2>
                    <p>Automated cloud-orchestrated form submissions.</p>
                </div>

                <form id="submission-form" class="minimal-form">
                    <div class="input-group">
                        <label for="form-url">Target URL</label>
                        <input type="url" id="form-url" placeholder="https://forms.google.com/..." required>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label for="response-count">Quantity</label>
                            <input type="number" id="response-count" min="1" value="1">
                        </div>
                        <div class="input-group">
                            <label>Execution Mode</label>
                            <div class="mode-selector">
                                <button type="button" class="mode-btn active" data-mode="stealth"
                                    title="Selenium human simulation">
                                    <i data-lucide="shield"></i> <span>Stealth</span>
                                </button>
                                <button type="button" class="mode-btn" data-mode="warp" title="High-speed direct POST">
                                    <i data-lucide="zap"></i> <span>Warp</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="toggle-group">
                        <label class="switch-control">
                            <input type="checkbox" id="ai-toggle" checked>
                            <span class="slider"></span>
                        </label>
                        <span class="toggle-label">Enable Neural Persona Engine</span>
                    </div>

                    <button type="submit" id="execute-btn" class="primary-btn">
                        <span class="btn-text">INITIALIZE DEPLOYMENT</span>
                        <i data-lucide="arrow-right"></i>
                    </button>
                </form>
            </section>

            <!-- Compact Telemetry & Stats -->
            <div class="secondary-grid">
                <section class="log-card">
                    <div class="card-header">
                        <h3>Telemetry Feed</h3>
                        <button id="clear-logs">Clear</button>
                    </div>
                    <div id="log-container" class="telemetry-log mono">
                        <div class="placeholder">Awaiting link...</div>
                    </div>
                </section>

                <section class="stats-mini-card">
                    <div class="mini-stat">
                        <span class="label">Total Uplinks</span>
                        <span class="value" id="stat-uplinks">0</span>
                    </div>
                    <div class="mini-stat">
                        <span class="label">Engine Heath</span>
                        <span class="value success">99.9%</span>
                    </div>
                </section>
            </div>
        </main>

        <footer class="minimal-footer">
            <p>&copy; 2026 FormBot Studio. Human Imitation Engine.</p>
        </footer>
    </div>

    <script src="main.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
